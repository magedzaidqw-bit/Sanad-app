async function sendWeeklyReportWA() {
  if (!confirm('سيتم فتح واتساب لكل ولي أمر لديه رقم مسجل. هل تريد المتابعة؟')) return;

  // جلب طلاب المحفظ مع بيانات الأهالي
  const { data: circles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id);
  if (!circles?.length) { alert('لا توجد حلقات مرتبطة بحسابك'); return; }
  const circleIds = circles.map(c=>c.id);
  const { data: students } = await sb.from('students').select('*').in('circle_id', circleIds).order('full_name');
  if (!students?.length) { alert('لا يوجد طلاب'); return; }

  // نطاق هذا الأسبوع
  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekStartStr = weekStart.toISOString().split('T')[0];
  const todayStr = new Date().toISOString().split('T')[0];

  let sent = 0, skipped = 0, excludedAbsent = 0;
  const sentByCircle = {};
  for (const s of students) {
    if (!s.parent_phone) { skipped++; continue; }

    const { data: att }  = await sb.from('attendance').select('status').eq('student_id', s.id).gte('date', weekStartStr).lte('date', todayStr);
    const present = att?.filter(a=>a.status==='present').length||0;

    // نستثني الطالب الغائب طوال الأسبوع بالكامل — لا داعي لإرسال تقرير فارغ لا يحتوي أي بيانات
    if (present === 0) { excludedAbsent++; continue; }

    const { data: memo } = await sb.from('memorization_log').select('surah_from,surah_to,verses_count,mastery').eq('student_id', s.id).gte('date', weekStartStr).lte('date', todayStr);
    const { data: beh }  = await sb.from('behavior_log').select('score').eq('student_id', s.id).gte('date', weekStartStr).lte('date', todayStr);

    const absent  = att?.filter(a=>a.status==='absent').length||0;
    const excused = att?.filter(a=>a.status==='excused').length||0;
    const verses  = memo?.reduce((s,m)=>s+(m.verses_count||0),0)||0;
    const behAvg  = beh?.length ? (beh.reduce((s,b)=>s+b.score,0)/beh.length).toFixed(1) : '—';
    const memoSummary = memo?.length
      ? memo.map(m=>`• من ${m.surah_from} إلى ${m.surah_to} (${m.verses_count} آية) — ${m.mastery==='excellent'?'ممتاز':m.mastery==='good'?'جيد':m.mastery==='needs_review'?'يحتاج مراجعة':'ضعيف'}`).join('\n')
      : '• لم يُسجَّل حفظ هذا الأسبوع';

    const msg =
`السلام عليكم ورحمة الله وبركاته 🌿
${s.parent_name ? `/ ${s.parent_name}` : ''}

تقرير أسبوعي لابنكم
*${s.full_name}*
من برنامج سند 📖

━━━━━━━━━━━━━━━
📅 *الحضور هذا الأسبوع:*
✅ حاضر: ${present} | ❌ غائب: ${absent} | 〰️ بعذر: ${excused}

📖 *الحفظ:*
${memoSummary}
إجمالي الآيات: ${verses} آية

🌟 *السلوك:* ${behAvg}/5
━━━━━━━━━━━━━━━

بارك الله في ابنكم وجعله من حفاظ كتاب الله 🤲`;

    const url = `https://wa.me/965${s.parent_phone}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
    sent++;
    sentByCircle[s.circle_id] = (sentByCircle[s.circle_id]||0) + 1;
    await new Promise(r => setTimeout(r, 1000));
  }

  // نسجّل بصمت أن المحفظ نفّذ إرسال التقرير الأسبوعي هذا الأسبوع، بدقة لكل حلقة على حدة
  // (مهم للمحفظ الذي لديه أكثر من حلقة)، ليظهر ذلك للمشرف بدون أي خطوة إضافية من المحفظ
  let logError = null;
  if (sent > 0) {
    const rows = Object.entries(sentByCircle).map(([circle_id, count]) => ({
      teacher_id: CU.id, circle_id, week_start: weekStartStr, sent_count: count
    }));
    const { error } = await sb.from('weekly_report_sends').insert(rows);
    if (error) { logError = error.message; console.error('تعذر تسجيل حالة الإرسال الأسبوعي:', error); }
  }

  alert(`✅ تم فتح واتساب لـ ${sent} ولي أمر${skipped>0?`\n⚠️ ${skipped} طالب بدون رقم ولي أمر مسجل`:''}${excludedAbsent>0?`\nℹ️ ${excludedAbsent} طالب مستثنى (غياب كامل هذا الأسبوع)`:''}${logError?`\n\n⚠️ تنبيه فني: تعذر تسجيل حالة الإرسال للمشرف:\n${logError}`:''}`);
}

// ===================== SUPERVISOR HOME (ومتابعة الحلقات للمدير أيضًا) =====================
async function loadSupHome() {
  const c = document.getElementById('sup-content');
  let circleIds;

  if (CP.role === 'admin') {
    // المدير يرى كل الحلقات في المركز دون الحاجة لإسناد إشرافي
    const { data: allCircles } = await sb.from('circles').select('id');
    circleIds = (allCircles||[]).map(c=>c.id);
    if (!circleIds.length) { c.innerHTML = emptyDiv('🕌','لا توجد حلقات مسجّلة بعد.'); return; }
  } else {
    const { data: links } = await sb.from('supervisor_circles').select('circle_id').eq('supervisor_id', CU.id);
    if (!links?.length) { c.innerHTML = emptyDiv('🧑‍💼','لم يتم تعيينك على أي حلقة بعد.'); return; }
    circleIds = links.map(l => l.circle_id);
  }

  c.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ تحميل البيانات...</p></div>';

  const { data: circles } = await sb.from('circles').select('id,name,schedule,location,teacher_name,teacher_id').in('id', circleIds);

  // جمع إحصائيات كل حلقة
  // نجيب كل الطلاب لكل الحلقات دفعة واحدة (بدل استعلام منفصل لكل حلقة)
  const { data: allStudents } = await sb.from('students').select('id,circle_id').in('circle_id', circleIds);
  const allStudentIds = (allStudents||[]).map(s=>s.id);

  // ونجيب كل بيانات الحضور والحفظ والسلوك لكل الطلاب دفعة واحدة أيضاً (3 استعلامات فقط بدلاً من 3×عدد الحلقات)
  const [attAllRes, memoAllRes, behAllRes] = allStudentIds.length ? await Promise.all([
    sb.from('attendance').select('student_id,status').in('student_id', allStudentIds),
    sb.from('memorization_log').select('student_id,mastery').in('student_id', allStudentIds),
    sb.from('behavior_log').select('student_id,score').in('student_id', allStudentIds)
  ]) : [{data:[]},{data:[]},{data:[]}];

  // نطاق هذا الأسبوع (لحساب الطلاب "المستحقين" لتقرير هذا الأسبوع فقط لاحقًا)
  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekStartStr = weekStart.toISOString().split('T')[0];

  // فهرسة سريعة لكل طالب حسب حلقته لتوزيع البيانات محلياً بدون أي استعلامات إضافية
  const studentsByCircle = {};
  (allStudents||[]).forEach(s => { (studentsByCircle[s.circle_id] ||= []).push(s.id); });

  const circleStats = [];
  for (const circle of (circles||[])) {
    const studentIds = new Set(studentsByCircle[circle.id] || []);
    const count = studentIds.size;

    let attRate = 0, memoAvg = 0, behAvg = 0;
    if (count > 0) {
      const att = (attAllRes.data||[]).filter(a => studentIds.has(a.student_id));
      const memo = (memoAllRes.data||[]).filter(m => studentIds.has(m.student_id));
      const beh = (behAllRes.data||[]).filter(b => studentIds.has(b.student_id));

      attRate = att.length ? Math.round(att.filter(a=>a.status==='present').length / att.length * 100) : 0;
      memoAvg = memo.length ? (memo.reduce((s,m)=>s+gradeFromMastery(m.mastery),0)/memo.length).toFixed(1) : 0;
      behAvg  = beh.length  ? (beh.reduce((s,b)=>s+b.score,0)/beh.length).toFixed(1) : 0;
    }
    circleStats.push({ circle, count, attRate, memoAvg, behAvg });
  }

  // ترتيب الحلقات حسب نسبة الحضور
  circleStats.sort((a,b) => b.attRate - a.attRate);
  const bestAttCircle  = [...circleStats].sort((a,b) => b.attRate - a.attRate)[0];
  const bestMemoCircle = [...circleStats].sort((a,b) => parseFloat(b.memoAvg)-parseFloat(a.memoAvg))[0];

  // حالة إرسال التقرير الأسبوعي لكل حلقة خلال هذا الأسبوع — لمتابعة التزام المحفظين بدقة
  const { data: sends } = circleIds.length
    ? await sb.from('weekly_report_sends').select('circle_id,sent_count').eq('week_start', weekStartStr).in('circle_id', circleIds)
    : { data: [] };
  const sentCountByCircle = {};
  (sends||[]).forEach(s => { sentCountByCircle[s.circle_id] = (sentCountByCircle[s.circle_id]||0) + (s.sent_count||0); });

  // عدد الطلاب "المستحقين" لتقرير هذا الأسبوع = من حضر ولو مرة واحدة (نستثني الغياب الكامل)
  const { data: weekAtt } = allStudentIds.length
    ? await sb.from('attendance').select('student_id,status').in('student_id', allStudentIds).gte('date', weekStartStr)
    : { data: [] };
  const presentThisWeekIds = new Set((weekAtt||[]).filter(a=>a.status==='present').map(a=>a.student_id));
  const eligibleCountByCircle = {};
  Object.keys(studentsByCircle).forEach(cid => {
    eligibleCountByCircle[cid] = studentsByCircle[cid].filter(sid => presentThisWeekIds.has(sid)).length;
  });

  // بطاقات ملخص
  const totalStudents = circleStats.reduce((s,c)=>s+c.count,0);
  const avgAtt = circleStats.length ? Math.round(circleStats.reduce((s,c)=>s+c.attRate,0)/circleStats.length) : 0;
  const bestCircle = circleStats[0];

  let html = `
  <div class="sgrid" style="margin-bottom:20px">
    <div class="sc"><div class="si">🕌</div><div><div class="sn">${circles?.length||0}</div><div class="sl">حلقات تحت إشرافك</div></div></div>
    <div class="sc" style="border-color:var(--gold)"><div class="si" style="background:#fdf1d9">🎓</div><div><div class="sn">${totalStudents}</div><div class="sl">إجمالي الطلاب</div></div></div>
    <div class="sc" style="border-color:#14568f"><div class="si" style="background:#e0eefb">📅</div><div><div class="sn">${avgAtt}%</div><div class="sl">متوسط الحضور</div></div></div>
    ${bestAttCircle  ? `<div class="sc" style="border-color:#1d6b3a"><div class="si" style="background:#e3f3e8">🏆</div><div><div class="sn" style="font-size:13px">${bestAttCircle.circle.name}</div><div class="sl">أعلى حضور (${bestAttCircle.attRate}%)</div></div></div>` : ''}
    ${bestMemoCircle ? `<div class="sc" style="border-color:#c9a153"><div class="si" style="background:#fdf1d9">📖</div><div><div class="sn" style="font-size:13px">${bestMemoCircle.circle.name}</div><div class="sl">أعلى حفظ (${bestMemoCircle.memoAvg}/5)</div></div></div>` : ''}
  </div>

  <!-- جدول المقارنة -->
  <div class="card" style="margin-bottom:20px">
    <div class="ch"><h3>📊 مقارنة الحلقات</h3></div>
    <div class="cb">
      <div class="tw">
        <table>
          <thead>
            <tr>
              <th>الحلقة</th>
              <th>المحفظ</th>
              <th>الطلاب</th>
              <th>نسبة الحضور</th>
              <th>متوسط الحفظ</th>
              <th>متوسط السلوك</th>
              <th>التقييم الكلي</th>
              <th>التقرير الأسبوعي</th>
            </tr>
          </thead>
          <tbody>
            ${circleStats.map((s,i) => {
              const total = ((s.attRate/100)*5 + parseFloat(s.memoAvg||0) + parseFloat(s.behAvg||0)).toFixed(1);
              const attColor = s.attRate>=80?'be':s.attRate>=60?'br':'bw';
              const rank = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
              return `<tr>
                <td><strong>${rank} ${s.circle.name}</strong></td>
                <td>${s.circle.teacher_name||'—'}</td>
                <td><strong>${s.count}</strong></td>
                <td>
                  <span class="badge ${attColor}">${s.attRate}%</span>
                  <div class="sb" style="margin-top:4px;width:80px"><div class="sf" style="width:${s.attRate}%"></div></div>
                </td>
                <td><strong>${s.memoAvg}</strong>/5</td>
                <td><strong>${s.behAvg}</strong>/5</td>
                <td><strong style="color:var(--gd)">${total}/15</strong></td>
                <td>${(() => {
                    const sentCount = sentCountByCircle[s.circle.id]||0;
                    const eligible = eligibleCountByCircle[s.circle.id]||0;
                    if (eligible === 0) return '<span class="badge bg" style="font-size:11px">— لا يوجد حضور هذا الأسبوع</span>';
                    const pct = Math.min(100, Math.round(sentCount/eligible*100));
                    // اللون يتدرّج من الأحمر (لم يُرسل) إلى الأصفر (جزئي) إلى الأخضر (اكتمل)
                    const barColor = pct === 0 ? '#a3262b' : pct >= 100 ? '#1d6b3a' : '#c9962e';
                    const label = pct === 0 ? '⏳ لم يُرسل بعد' : pct >= 100 ? `✅ اكتمل (${sentCount})` : `⚠️ ${sentCount} من ${eligible}`;
                    return `
                      <div style="min-width:110px">
                        <div style="font-size:11px;font-weight:700;color:${barColor};margin-bottom:3px">${label}</div>
                        <div style="width:100%;height:8px;border-radius:5px;background:#e8e4d8;overflow:hidden">
                          <div style="width:${pct}%;height:100%;background:${barColor};border-radius:5px;transition:width 0.4s"></div>
                        </div>
                      </div>`;
                  })()}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

  </div>

    // مخطط الحضور

    if (attCtx) new Chart(attCtx, {
      type: 'bar',
      data: { labels, datasets:[{ label:'نسبة الحضور %', data: circleStats.map(s=>s.attRate), backgroundColor: circleStats.map((s,i)=>s.attRate>=80?'rgba(27,42,74,0.8)':s.attRate>=60?'rgba(166,106,12,0.8)':'rgba(163,38,43,0.8)'), borderRadius:6 }] },
      options: { plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true, max:100, ticks:{ callback:v=>v+'%', font:{family:'Cairo',size:10} } }, x:{ ticks:{ font:{family:'Cairo',size:9}, maxRotation:30 } } } }
    });

    // مخطط الحفظ
    const memoCtx = document.getElementById('sup-chart-memo')?.getContext('2d');
    if (memoCtx) new Chart(memoCtx, {
      type: 'bar',
      data: { labels, datasets:[{ label:'متوسط الحفظ /5', data: circleStats.map(s=>parseFloat(s.memoAvg)||0), backgroundColor:'rgba(20,86,143,0.8)', borderRadius:6 }] },
      options: { plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true, max:5, ticks:{ font:{family:'Cairo',size:10} } }, x:{ ticks:{ font:{family:'Cairo',size:9}, maxRotation:30 } } } }
    });
  }, 200);
}

// ===================== DONORS (المتبرعون) =====================
let editingDonorId = null;

async function loadDonors() {
  const { data: donors } = await sb.from('donors').select('*').order('full_name');
  const { data: links } = await sb.from('donor_circles').select('donor_id, circles(id,name)');

  const circlesByDonor = {};
  links?.forEach(l => {
    if (!circlesByDonor[l.donor_id]) circlesByDonor[l.donor_id] = [];
    circlesByDonor[l.donor_id].push(l.circles);
  });

  const b = document.getElementById('donors-body');
  if (!donors?.length) { b.innerHTML = emptyRow(5,'لا يوجد متبرعون بعد'); return; }

  b.innerHTML = donors.map((d,i) => {
    const circles = circlesByDonor[d.id] || [];
    const circleNames = circles.map(c=>c?.name).filter(Boolean).join('، ') || '—';
    return `<tr>
      <td style="color:var(--mid);font-weight:700">${i+1}</td>
      <td><strong>${d.full_name}</strong>${d.notes?`<br><small style="color:var(--mid)">${d.notes}</small>`:''}</td>
      <td>${d.phone||'—'}</td>
      <td><span style="font-size:12px">${circleNames}</span></td>
      <td>
        <button class="btn btn-g btn-sm" onclick="showDonorReport('${d.id}','${esc(d.full_name)}','${d.phone||''}')">📋 تقرير</button>
        <button class="btn btn-o btn-sm" onclick="editDonor('${d.id}')">✏️</button>
        <button class="btn btn-r btn-sm" onclick="delDonor('${d.id}')">حذف</button>
      </td></tr>`;
  }).join('');
}

async function openAddDonor() {
  editingDonorId = null;
  document.getElementById('donor-modal-title').textContent = 'إضافة متبرع';
  document.getElementById('donor-name').value = '';
  document.getElementById('donor-phone').value = '';
  document.getElementById('donor-notes').value = '';
  await loadDonorCirclesChecks([]);
  openM('m-donor');
}

async function editDonor(id) {
  const { data: d } = await sb.from('donors').select('*').eq('id', id).single();
  const { data: links } = await sb.from('donor_circles').select('circle_id').eq('donor_id', id);
  editingDonorId = id;
  document.getElementById('donor-modal-title').textContent = 'تعديل بيانات المتبرع';
  document.getElementById('donor-name').value = d.full_name || '';
  document.getElementById('donor-phone').value = d.phone || '';
  document.getElementById('donor-notes').value = d.notes || '';
  const checkedIds = links?.map(l => l.circle_id) || [];
  await loadDonorCirclesChecks(checkedIds);
  openM('m-donor');
}

async function loadDonorCirclesChecks(checkedIds=[]) {
  const { data: circles } = await sb.from('circles').select('id,name').order('name');
  const container = document.getElementById('donor-circles-checks');
  container.innerHTML = circles?.map(c => `
    <label style="display:flex;align-items:center;gap:8px;padding:6px;cursor:pointer;border-radius:6px;margin-bottom:3px;background:${checkedIds.includes(c.id)?'#e8f5e9':'transparent'}">
      <input type="checkbox" value="${c.id}" ${checkedIds.includes(c.id)?'checked':''}
        onchange="this.closest('label').style.background=this.checked?'#e8f5e9':'transparent'">
      <span style="font-size:13px">${c.name}</span>
    </label>`).join('') || '';
}

async function saveDonor() {
  const name = v('donor-name'), phone = v('donor-phone'), notes = v('donor-notes');
  if (!name) { showAlert('donor-alert','أدخل اسم المتبرع','err'); return; }
  const circleIds = Array.from(document.querySelectorAll('#donor-circles-checks input:checked')).map(i=>i.value);

  if (editingDonorId) {
    await sb.from('donors').update({ full_name: name, phone, notes }).eq('id', editingDonorId);
    await sb.from('donor_circles').delete().eq('donor_id', editingDonorId);
    if (circleIds.length) await sb.from('donor_circles').insert(circleIds.map(cid=>({ donor_id: editingDonorId, circle_id: cid })));
    editingDonorId = null;
  } else {
    const { data: nd } = await sb.from('donors').insert({ full_name: name, phone, notes }).select().single();
    if (nd && circleIds.length) await sb.from('donor_circles').insert(circleIds.map(cid=>({ donor_id: nd.id, circle_id: cid })));
  }
  closeM('m-donor');
  loadDonors();
}

async function delDonor(id) {
  if (!confirm('حذف هذا المتبرع؟')) return;
  await sb.from('donors').delete().eq('id', id);
  loadDonors();
}

// متغير لتخزين بيانات المتبرع الحالي للتحديث
let _currentDonor = null;

async function refreshDonorReport() {
  if (!_currentDonor) return;
  await showDonorReport(_currentDonor.id, _currentDonor.name, _currentDonor.phone);
}

async function showDonorReport(donorId, donorName, donorPhone) {
  // تخزين بيانات المتبرع الحالي
  _currentDonor = { id: donorId, name: donorName, phone: donorPhone };

  // ضبط الشهر الافتراضي (الشهر السابق)
  const now = new Date();
  const defaultMonth = now.getMonth() === 0 ? 12 : now.getMonth();
  const defaultYear  = now.getMonth() === 0 ? now.getFullYear()-1 : now.getFullYear();
  const mSel = document.getElementById('donor-report-month');
  const ySel = document.getElementById('donor-report-year');
  if (mSel && !mSel._set) { mSel.value = defaultMonth; mSel._set = true; }
  if (ySel && !ySel._set) { ySel.value = defaultYear;  ySel._set = true; }
  const body = document.getElementById('donor-report-body');
  document.getElementById('donor-report-title').textContent = `تقرير المتبرع: ${donorName}`;
  body.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ تحميل البيانات...</p></div>';
  openM('m-donor-report');

  const { data: links } = await sb.from('donor_circles').select('circle_id, circles(id,name,teacher_name)').eq('donor_id', donorId);
  if (!links?.length) { body.innerHTML = emptyDiv('🕌','لا توجد حلقات مرتبطة بهذا المتبرع'); return; }

  let totalStudents=0, totalVerses=0, totalPresent=0, totalAbsent=0, totalExcused=0;
  let allMemo=[], allBeh=[];
  const circlesData=[];

  // الشهر المختار
  const selMonth = parseInt(document.getElementById('donor-report-month')?.value || new Date().getMonth());
  const selYear  = parseInt(document.getElementById('donor-report-year')?.value  || new Date().getFullYear());
  const monthStart = `${selYear}-${String(selMonth).padStart(2,'0')}-01`;
  const monthEnd   = new Date(selYear, selMonth, 0).toISOString().split('T')[0];

  // آخر 6 أشهر للرسم البياني
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(selYear, selMonth-1-i, 1);
    months.push({label:d.toLocaleDateString('ar-KW',{month:'short',year:'2-digit'}),
      start:new Date(d.getFullYear(),d.getMonth(),1).toISOString().split('T')[0],
      end:new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split('T')[0]});
  }

  for(const link of links){
    const circle=link.circles; if(!circle) continue;
    const {data:students}=await sb.from('students').select('id,full_name').eq('circle_id',circle.id).order('full_name');
    const studentIds=students?.map(s=>s.id)||[];
    totalStudents+=studentIds.length;
    let memoData=[],behData=[],attData2=[];
    if(studentIds.length){
      const [m,b,a]=await Promise.all([
        sb.from('memorization_log').select('student_id,surah_from,surah_to,verses_count,mastery,date').in('student_id',studentIds).gte('date',monthStart).lte('date',monthEnd).order('date',{ascending:false}),
        sb.from('behavior_log').select('student_id,score,date').in('student_id',studentIds).gte('date',monthStart).lte('date',monthEnd),
        sb.from('attendance').select('student_id,status,date').in('student_id',studentIds).gte('date',monthStart).lte('date',monthEnd)
      ]);
      memoData=m.data||[]; behData=b.data||[]; attData2=a.data||[];
    }
    const verses=memoData.reduce((s,m)=>s+(m.verses_count||0),0);
    const present=attData2.filter(a=>a.status==='present').length;
    const absent=attData2.filter(a=>a.status==='absent').length;
    const excused=attData2.filter(a=>a.status==='excused').length;
    totalVerses+=verses; totalPresent+=present; totalAbsent+=absent; totalExcused+=excused;
    allMemo=[...allMemo,...memoData]; allBeh=[...allBeh,...behData];
    circlesData.push({circle,students,memoData,behData,attData2,verses,present,absent,excused});
  }

  const totalAtt=totalPresent+totalAbsent+totalExcused;
  const attRate=totalAtt?Math.round(totalPresent/totalAtt*100):0;
  const behAvg=allBeh.length?(allBeh.reduce((s,b)=>s+b.score,0)/allBeh.length).toFixed(1):'—';
  const monthlyVerses=months.map(m=>allMemo.filter(r=>r.date>=m.start&&r.date<=m.end).reduce((s,r)=>s+(r.verses_count||0),0));
  const masteryCount={
    excellent:allMemo.filter(m=>m.mastery==='excellent').length,
    good:allMemo.filter(m=>m.mastery==='good').length,
    needs_review:allMemo.filter(m=>m.mastery==='needs_review').length,
    weak:allMemo.filter(m=>m.mastery==='weak').length
  };

  const monthName = new Date(selYear, selMonth-1, 1).toLocaleDateString('ar-KW',{month:'long',year:'numeric'});
  document.getElementById('donor-report-title').textContent = `تقرير المتبرع: ${donorName} — ${monthName}`;

  let html=`
  <div style="background:linear-gradient(135deg,var(--gd),#24345c);border-radius:18px;padding:24px;color:white;text-align:center;margin-bottom:20px">
    <div style="font-size:32px;margin-bottom:8px">💚</div>
    <div style="font-family:'Amiri',serif;font-size:18px;color:var(--gold3);margin-bottom:12px;font-weight:700">بفضل تبرعكم الكريم — ${monthName}</div>
    <div style="font-size:17px;line-height:2;font-weight:600">
      استفاد <strong style="color:white;font-size:26px;background:rgba(255,255,255,0.15);padding:2px 12px;border-radius:8px">${totalStudents}</strong> طالباً من حلقاتكم المكفولة
      <br>
      وحفظوا <strong style="color:white;font-size:26px;background:rgba(255,255,255,0.15);padding:2px 12px;border-radius:8px">${totalVerses.toLocaleString()}</strong> آية من كتاب الله
    </div>
  </div>
  <div class="sgrid" style="margin-bottom:20px">
    <div class="sc"><div class="si">🎓</div><div><div class="sn">${totalStudents}</div><div class="sl">طالب مستفيد</div></div></div>
    <div class="sc" style="border-color:#1d6b3a"><div class="si" style="background:#e3f3e8">📅</div><div><div class="sn">${attRate}%</div><div class="sl">نسبة الحضور</div></div></div>
    <div class="sc" style="border-color:#14568f"><div class="si" style="background:#e0eefb">📖</div><div><div class="sn">${totalVerses.toLocaleString()}</div><div class="sl">آية محفوظة</div></div></div>
    <div class="sc" style="border-color:var(--gold)"><div class="si" style="background:#fdf1d9">🌟</div><div><div class="sn">${behAvg}</div><div class="sl">متوسط السلوك /5</div></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div class="card"><div class="ch"><h3>📅 الحضور والغياب</h3></div>
      <div class="cb" style="display:flex;align-items:center;justify-content:center"><canvas id="chart-att" width="200" height="200"></canvas></div>
      <div style="padding:0 16px 16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <span class="badge be">✓ ${totalPresent}</span><span class="badge ba">✗ ${totalAbsent}</span><span class="badge bex">~ ${totalExcused}</span>
      </div>
    </div>
    <div class="card"><div class="ch"><h3>📖 مستوى الإتقان</h3></div>
      <div class="cb" style="display:flex;align-items:center;justify-content:center"><canvas id="chart-mastery" width="200" height="200"></canvas></div>
      <div style="padding:0 16px 16px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;font-size:11px">
        <span class="badge be">ممتاز:${masteryCount.excellent}</span><span class="badge bg">جيد:${masteryCount.good}</span>
        <span class="badge br">يراجع:${masteryCount.needs_review}</span><span class="badge bw">ضعيف:${masteryCount.weak}</span>
      </div>
    </div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div class="ch"><h3>📈 تطور الحفظ — آخر 6 أشهر</h3></div>
    <div class="cb"><canvas id="chart-monthly" height="110"></canvas></div>
  </div>
  <h4 style="font-size:15px;font-weight:700;color:var(--gd);margin-bottom:14px">🕌 تفاصيل الحلقات</h4>`;

  for(const cd of circlesData){
    const {circle,students,memoData,behData,attData2,verses,present,absent}=cd;
    const sAttRate=(present+absent+cd.excused)?Math.round(present/(present+absent+cd.excused)*100):0;
    const sBehAvg=behData.length?(behData.reduce((s,b)=>s+b.score,0)/behData.length).toFixed(1):'—';
    const attColor=sAttRate>=80?'be':sAttRate>=60?'br':'bw';
    const studentsRows=(students||[]).map(s=>{
      const sMemo=memoData.filter(m=>m.student_id===s.id);
      const sBeh=behData.filter(b=>b.student_id===s.id);
      const sAtt=attData2.filter(a=>a.student_id===s.id);
      const sPresent=sAtt.filter(a=>a.status==='present').length;
      const sAbsent=sAtt.filter(a=>a.status==='absent').length;
      const sVerses=sMemo.reduce((t,m)=>t+(m.verses_count||0),0);
      const sSBehAvg=sBeh.length?(sBeh.reduce((t,b)=>t+b.score,0)/sBeh.length).toFixed(1):'—';
      const sRate=(sPresent+sAbsent)?Math.round(sPresent/(sPresent+sAbsent)*100):0;
      const sc=sRate>=80?'be':sRate>=60?'br':'bw';
      return `<tr><td><strong>${s.full_name}</strong></td><td><span class="badge ${sc}">${sRate}%</span> (${sPresent}✓ ${sAbsent}✗)</td><td>${sVerses} آية (${sMemo.length} جلسة)</td><td>${sSBehAvg}/5</td></tr>`;
    }).join('');
    html+=`<div class="report-card" style="margin-bottom:16px">
      <div class="report-card-head"><h3>🕌 ${circle.name}</h3><span style="color:var(--gold3);font-size:13px">المحفظ: ${circle.teacher_name||'—'} | <span class="badge ${attColor}">${sAttRate}% حضور</span></span></div>
      <div class="report-section">
        <div class="stat-row">
          <div class="stat-box"><div class="num">${students?.length||0}</div><div class="lbl">طالب</div></div>
          <div class="stat-box"><div class="num">${sAttRate}%</div><div class="lbl">الحضور</div></div>
          <div class="stat-box"><div class="num">${present}</div><div class="lbl">حاضر</div></div>
          <div class="stat-box"><div class="num">${absent}</div><div class="lbl">غائب</div></div>
          <div class="stat-box"><div class="num">${verses}</div><div class="lbl">آية</div></div>
          <div class="stat-box"><div class="num">${sBehAvg}</div><div class="lbl">السلوك</div></div>
        </div>
        <div class="tw"><table><thead><tr><th>الطالب</th><th>الحضور</th><th>الحفظ</th><th>السلوك</th></tr></thead>
        <tbody>${studentsRows||emptyRow(4,'لا يوجد طلاب')}</tbody></table></div>
      </div>
    </div>`;
  }

  html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;justify-content:center">
    <button class="btn-pri" id="donor-wa-btn" style="background:linear-gradient(135deg,#25D366,#128C7E);padding:12px 28px" onclick="window._donorWA()">📱 إرسال واتساب</button>
    <button class="btn btn-o" style="padding:12px 28px" onclick="window._donorPrint()">🖨️ طباعة / حفظ PDF</button>
  </div>`;

  body.innerHTML=html;

  // تخزين بيانات المتبرع للاستخدام في الأزرار
  window._donorWA = donorPhone ? () => sendDonorReportWA(donorName, donorPhone) : () => alert('لا يوجد رقم هاتف لهذا المتبرع');
  window._donorPrint = () => printDonorReport(donorName);

  // تخزين بيانات الطباعة المنظمة
  window._donorPrintData = {
    totalStudents, totalVerses, attRate, behAvg,
    circles: circlesData.map(cd => ({
      name: cd.circle.name,
      teacher: cd.circle.teacher_name || '—',
      attRate: (cd.present+cd.absent) ? Math.round(cd.present/(cd.present+cd.absent)*100) : 0,
      students: (cd.students||[]).map(s => {
        const sMemo = cd.memoData.filter(m=>m.student_id===s.id);
        const sBeh  = cd.behData.filter(b=>b.student_id===s.id);
        const sAtt  = cd.attData2.filter(a=>a.student_id===s.id);
        const present = sAtt.filter(a=>a.status==='present').length;
        const absent  = sAtt.filter(a=>a.status==='absent').length;
        const totalA  = present+absent;
        return {
          name: s.full_name,
          present, absent,
          attRate: totalA ? Math.round(present/totalA*100) : 0,
          verses: sMemo.reduce((t,m)=>t+(m.verses_count||0),0),
          sessions: sMemo.length,
          beh: sBeh.length ? (sBeh.reduce((t,b)=>t+b.score,0)/sBeh.length).toFixed(1) : '—'
        };
      })
    }))
  };
  // إخفاء زر واتساب إذا لا يوجد رقم
  if (!donorPhone) { const wb = document.getElementById('donor-wa-btn'); if(wb) wb.style.display='none'; }

  setTimeout(()=>{
    const attCtx=document.getElementById('chart-att')?.getContext('2d');
    if(attCtx&&totalAtt>0) new Chart(attCtx,{type:'doughnut',data:{labels:['حاضر','غائب','بعذر'],datasets:[{data:[totalPresent,totalAbsent,totalExcused],backgroundColor:['#1d6b3a','#a3262b','#a66a0c'],borderWidth:2}]},options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Cairo',size:11}}}},cutout:'65%'}});
    const mastCtx=document.getElementById('chart-mastery')?.getContext('2d');
    if(mastCtx&&allMemo.length>0) new Chart(mastCtx,{type:'doughnut',data:{labels:['ممتاز','جيد','يحتاج مراجعة','ضعيف'],datasets:[{data:[masteryCount.excellent,masteryCount.good,masteryCount.needs_review,masteryCount.weak],backgroundColor:['#1d6b3a','#14568f','#a66a0c','#a3262b'],borderWidth:2}]},options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Cairo',size:11}}}},cutout:'65%'}});
    const monCtx=document.getElementById('chart-monthly')?.getContext('2d');
    if(monCtx) new Chart(monCtx,{type:'bar',data:{labels:months.map(m=>m.label),datasets:[{label:'آيات محفوظة',data:monthlyVerses,backgroundColor:'rgba(27,42,74,0.75)',borderColor:'#1B2A4A',borderWidth:2,borderRadius:6}]},options:{plugins:{legend:{labels:{font:{family:'Cairo'}}}},scales:{y:{beginAtZero:true,ticks:{font:{family:'Cairo'}}},x:{ticks:{font:{family:'Cairo'}}}}}});
  },200);
}

async function downloadDonorPDF(donorName) {
  const content = document.getElementById('donor-report-body');
  if (!content) return;

  const btn = event.target;
  btn.textContent = '⏳ جارٍ التحضير...';
  btn.disabled = true;

  // إنشاء عنصر مؤقت للطباعة
  const printEl = document.createElement('div');
  printEl.style.cssText = 'direction:rtl;font-family:Arial,sans-serif;padding:20px;color:#000;background:#fff';
  printEl.innerHTML = `
    <div style="text-align:center;margin-bottom:20px;border-bottom:3px solid #0d1830;padding-bottom:14px">
      <div style="font-size:18px;font-weight:900;color:#0d1830;margin-bottom:4px">سند</div>
      <div style="font-size:13px;color:#34517a;font-weight:700">إدارة حلقات تحفيظ القرآن الكريم</div>
    </div>
    <h2 style="text-align:center;font-size:16px;color:#0d1830;margin:12px 0 4px">تقرير المتبرع: ${donorName}</h2>
    <p style="text-align:center;font-size:11px;color:#888;margin-bottom:16px">تاريخ التقرير: ${new Date().toLocaleDateString('ar-KW')}</p>
    ${content.innerHTML}
    <div style="margin-top:20px;text-align:center;font-size:12px;color:#555;border-top:2px solid #0d1830;padding-top:10px;font-weight:700">
      سند... حرفٌ يُحفظ، وجيلٌ يُبنى
    </div>`;

  // إزالة الأزرار من PDF
  printEl.querySelectorAll('button').forEach(b => b.remove());

  document.body.appendChild(printEl);

  const opt = {
    margin: [10, 10, 10, 10],
    filename: `تقرير_${donorName}_${new Date().toLocaleDateString('ar-KW').replace(/\//g,'-')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, rtl: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  try {
    await html2pdf().set(opt).from(printEl).save();

}

let notifInterval = null;

async function loadNotifications() {
  if (!CU || !['admin','supervisor'].includes(CP?.role)) return;
  const bell = document.getElementById('notif-bell-btn');
  if (bell) bell.style.display = 'block';

  const { data } = await sb.from('notifications')
    .select('*,from_user:profiles!notifications_from_user_id_fkey(full_name)')
    .eq('to_user_id', CU.id)
    .order('created_at', {ascending: false})
    .limit(20);

  const unread = (data||[]).filter(n => !n.is_read).length;
  const badge = document.getElementById('notif-badge');
  if (badge) {
    badge.textContent = unread;
    badge.classList.toggle('hidden', unread === 0);
  }

  const list = document.getElementById('notif-list');
  if (!list) return;
  if (!data?.length) {
    list.innerHTML = '<div class="empty" style="padding:30px"><div class="ei">🔔</div><p>لا توجد إشعارات</p></div>';
    return;
  }
  list.innerHTML = data.map(n => `
    <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="openNotif('${n.id}','${n.related_id||''}')">
      <div class="notif-icon">${n.type === 'monthly_report' ? '📋' : '🔔'}</div>
      <div class="notif-text">
        <div class="notif-title">${n.title}</div>
        <div class="notif-body-text">${n.body}</div>
        <div class="notif-time">${formatTime(n.created_at)} · ${n.from_user?.full_name||'النظام'}</div>
      </div>
    </div>`).join('');
}

// أيقونة منفصلة تمامًا عن جرس الإشعارات العام، مخصصة فقط لرسائل أولياء الأمور
async function loadParentMessageBadge() {
  if (!CU || CP?.role !== 'admin') return;
  const icon = document.getElementById('pm-icon-btn');
  if (icon) icon.style.display = 'block';

  const { count } = await sb.from('notifications')
    .select('id', { count: 'exact', head: true })
    .eq('to_user_id', CU.id)
    .eq('type', 'parent_note')
    .eq('is_read', false);

  const badge = document.getElementById('pm-icon-badge');
  if (badge) {
    badge.textContent = count || 0;
    badge.classList.toggle('hidden', !count);
  }
}

function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) loadNotifications();
}

document.addEventListener('click', function(e) {
  const panel = document.getElementById('notif-panel');
  const bell = document.getElementById('notif-bell-btn');
  if (panel?.classList.contains('open') && !panel.contains(e.target) && e.target !== bell && !bell?.contains(e.target)) {
    panel.classList.remove('open');
  }
});

async function openNotif(notifId, reportId) {
  await sb.from('notifications').update({is_read: true}).eq('id', notifId);
  loadNotifications();
  if (reportId) {
    const { data: report } = await sb.from('monthly_reports').select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name)').eq('id', reportId).single();
    if (report) showReportModal(report);
  }
  document.getElementById('notif-panel').classList.remove('open');
}

async function markAllRead() {
  await sb.from('notifications').update({is_read: true}).eq('to_user_id', CU.id).eq('is_read', false);
  loadNotifications();
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('ar-KW') + ' ' + d.toLocaleTimeString('ar-KW', {hour:'2-digit',minute:'2-digit'});
}

async function sendNotification(toUserId, title, body, type, relatedId) {
  try {
    await sb.from('notifications').insert({
      to_user_id: toUserId, from_user_id: CU.id,
      type, title, body, related_id: relatedId
    });
  } catch(e) { console.error('notif error:', e); }
}

async function saveCardAsImage() {
  const area = document.getElementById('achievement-printable');
  if (!area) return;
  const data = window._achievementData || {};
  const btn = event?.target;
  const origText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ التجهيز...'; }

  try {
    const canvas = await html2canvas(area, {
      scale: 3,
      useCORS: true,
      backgroundColor: '#071a0e',
      logging: false
    });

    const fileName = 'بطاقة_إنجاز_' + (data.name||'الطالب') + '.png';

    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');

  } catch(e) {
    showGlobalError('تعذر حفظ الصورة: ' + (e.message||''));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}

async function shareAchievementPdf() {
  if (typeof html2pdf === 'undefined') { showGlobalError('تعذر تحميل أداة PDF'); return; }
  const area = document.getElementById('achievement-printable');
  if (!area) return;
  const data = window._achievementData || {};
  const fileName = 'بطاقة_إنجاز_' + (data.name||'الطالب') + '_' + (data.periodLabel||'');
  const btn = event?.target;
  const origText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ التجهيز...'; }
  try {
    const pdfBlob = await html2pdf().set({
      margin: 0, filename: fileName + '.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 3, useCORS: true, backgroundColor: '#071a0e' },
      jsPDF: { unit: 'mm', format: 'a5', orientation: 'portrait' }
    }).from(area).outputPdf('blob');
    const dlUrl = URL.createObjectURL(pdfBlob);
    const dlA = document.createElement('a');
    dlA.href = dlUrl; dlA.download = fileName + '.pdf';
    document.body.appendChild(dlA); dlA.click();
    document.body.removeChild(dlA);
    setTimeout(() => URL.revokeObjectURL(dlUrl), 1000);
  } catch(e) {
    if (e.name !== 'AbortError') showGlobalError('تعذر إنشاء PDF: ' + (e.message||''));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}

async function sendParentNote() {
  const type = document.getElementById('parent-note-type').value;
  const text = document.getElementById('parent-note-text').value.trim();
  if (!text) { alert('اكتب رسالتك أولاً'); return; }

  const { data: kids } = await sb.from('students').select('full_name').eq('parent_id', CU.id).limit(1);
  const studentName = kids?.[0]?.full_name || 'أحد الطلاب';

  // الرسالة كانت تُحفظ بدون مستلم محدد (to_user_id: null) فلا تظهر أبدًا عند أي مدير،
  // لأن لوحة المدير تجلب فقط الإشعارات الموجّهة إليه تحديدًا (to_user_id = المدير).
  // الإصلاح: نجلب كل حسابات المدراء ونُرسل نسخة من الإشعار لكل واحد منهم.
  const { data: admins } = await sb.from('profiles').select('id').eq('role', 'admin');
  if (!admins || !admins.length) {
    showGlobalError('تعذر الإرسال: لا يوجد حساب مدير مسجّل لاستقبال الرسالة.');
    return;
  }

  const title = `${type} من ولي أمر ${studentName}`;
  const rows = admins.map(a => ({
    to_user_id: a.id,
    from_user_id: CU.id,
    type: 'parent_note',
    title,
    body: text,
    is_read: false
  }));

  const { error } = await sb.from('notifications').insert(rows);

  if (error) {
    showGlobalError('تعذر الإرسال: ' + (error.message || 'خطأ غير معروف'));
  } else {
    closeM('m-parent-note');
    document.getElementById('parent-note-text').value = '';
    alert('✅ تم إرسال رسالتك لإدارة المركز');
  }
}

let _pmFilter = 'all';

function filterParentMessages(f) {
  _pmFilter = f;
  document.getElementById('pmf-all')?.classList.toggle('active', f==='all');
  document.getElementById('pmf-unread')?.classList.toggle('active', f==='unread');
  loadParentMessages();
}

async function loadParentMessages() {
  const list = document.getElementById('parent-messages-list');
  const counter = document.getElementById('pm-unread-count');
  if (!list) return;
  list.innerHTML = '<div class="empty" style="padding:30px"><div class="ei">⏳</div><p>جارٍ التحميل...</p></div>';

  let q = sb.from('notifications')
    .select('*')
    .eq('to_user_id', CU.id)
    .eq('type', 'parent_note')
    .order('created_at', {ascending: false})
    .limit(200);
  if (_pmFilter === 'unread') q = q.eq('is_read', false);

  const { data, error } = await q;
  if (error) { list.innerHTML = emptyDiv('⚠️','تعذر تحميل الرسائل: ' + error.message); return; }

  const unreadTotal = (data||[]).filter(m => !m.is_read).length;
  if (counter) counter.textContent = unreadTotal ? `(${unreadTotal} غير مقروءة)` : '';

  if (!data || !data.length) {
    list.innerHTML = emptyDiv('✉️', _pmFilter==='unread' ? 'لا توجد رسائل غير مقروءة' : 'لا توجد رسائل من أولياء الأمور بعد');
    return;
  }

  list.innerHTML = data.map(m => `
    <div class="card" style="margin-bottom:10px;border-right:4px solid ${m.is_read ? 'var(--gray2)' : 'var(--gold)'};${m.is_read ? '' : 'background:#fffdf7'}">
      <div class="cb" style="padding:14px 16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
          <div style="font-weight:800;font-size:14px;color:var(--dark)">
            ${m.is_read ? '' : '<span style="color:var(--gold)">● </span>'}${escapeHtml(m.title||'رسالة من ولي أمر')}
          </div>
          <div style="font-size:11px;color:var(--mid)">${formatTime(m.created_at)}</div>
        </div>
        <p style="margin-top:8px;font-size:13.5px;line-height:1.8;color:#333;white-space:pre-wrap">${escapeHtml(m.body||'')}</p>
        <div style="display:flex;gap:8px;margin-top:10px">
          ${!m.is_read ? `<button class="btn btn-o btn-sm" onclick="markParentMessageRead('${m.id}')">✓ تحديد كمقروءة</button>` : ''}
          <button class="btn btn-sm" style="background:#fbe4e4;color:#a3262b;border:1px solid #f0c4c4" onclick="deleteParentMessage('${m.id}')">🗑️ حذف</button>
        </div>
      </div>
    </div>`).join('');
}

async function deleteParentMessage(id) {
  if (!confirm('حذف هذه الرسالة نهائيًا؟ لا يمكن التراجع عن هذا الإجراء.')) return;
  const { error } = await sb.from('notifications').delete().eq('id', id);
  if (error) {
    showGlobalError('تعذر حذف الرسالة: ' + (error.message || 'خطأ غير معروف'));
    return;
  }
  loadParentMessages();
  loadNotifications();
  loadParentMessageBadge();
}

async function markParentMessageRead(id) {
  await sb.from('notifications').update({is_read: true}).eq('id', id);
  loadParentMessages();
  loadNotifications(); // لتحديث عداد الجرس أيضًا
  loadParentMessageBadge(); // ولتحديث عداد أيقونة رسائل أولياء الأمور المخصصة
}

function escapeHtml(str) {
  const d = document.createElement('div');

}

async function loadSupCompare() {
  const c = document.getElementById('sup-compare-content');
  const { data: links } = await sb.from('supervisor_circles').select('circle_id').eq('supervisor_id', CU.id);
  if (!links?.length) { c.innerHTML = emptyDiv('🧑‍💼','لم يتم تعيينك على أي حلقة'); return; }
  c.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ تحميل البيانات...</p></div>';

  const circleIds = links.map(l=>l.circle_id);
  const { data: circles } = await sb.from('circles').select('id,name,teacher_name').in('id', circleIds);

  const circleStats = [];
  for (const circle of (circles||[])) {
    const { data: students } = await sb.from('students').select('id').eq('circle_id', circle.id);
    const studentIds = students?.map(s=>s.id) || [];
    const count = studentIds.length;
    let attRate=0, memoAvg=0, behAvg=0, totalVerses=0;
    if (count>0) {
      const [attR,memoR,behR] = await Promise.all([
        sb.from('attendance').select('status').in('student_id',studentIds),
        sb.from('memorization_log').select('mastery,verses_count').in('student_id',studentIds),
        sb.from('behavior_log').select('score').in('student_id',studentIds)
      ]);
      const att=attR.data||[], memo=memoR.data||[], beh=behR.data||[];
      attRate = att.length ? Math.round(att.filter(a=>a.status==='present').length/att.length*100) : 0;
      memoAvg = memo.length ? (memo.reduce((s,m)=>s+gradeFromMastery(m.mastery),0)/memo.length).toFixed(1) : 0;
      behAvg  = beh.length  ? (beh.reduce((s,b)=>s+b.score,0)/beh.length).toFixed(1) : 0;
      totalVerses = memo.reduce((s,m)=>s+(m.verses_count||0),0);
    }
    circleStats.push({ circle, count, attRate, memoAvg, behAvg, totalVerses });
  }

  circleStats.sort((a,b)=>b.attRate-a.attRate);

  const attColor = r => r>=80?'#1d6b3a':r>=60?'#a66a0c':'#a3262b';

  let html = `
  <div class="card" style="margin-bottom:16px">
    <div class="ch"><h3>📊 مقارنة الحلقات</h3></div>
    <div class="cb"><div class="tw">
    <table>
      <thead><tr>
        <th>الحلقة</th><th>المحفظ</th><th>الطلاب</th>
        <th>الحضور</th><th>متوسط الحفظ</th><th>السلوك</th><th>الآيات</th>
      </tr></thead>
      <tbody>
      ${circleStats.map((cs,i)=>`<tr${i===0?' style="background:#e8f5e9"':''}>
        <td><strong>${cs.circle.name}</strong>${i===0?'<span class="badge be" style="font-size:10px;margin-right:6px">الأفضل</span>':''}</td>
        <td>${cs.circle.teacher_name||'—'}</td>
        <td>${cs.count}</td>
        <td style="color:${attColor(cs.attRate)};font-weight:700">${cs.attRate}%</td>
        <td>${cs.memoAvg}/5</td>
        <td>${cs.behAvg}/5</td>
        <td>${cs.totalVerses.toLocaleString()}</td>
      </tr>`).join('')}
      </tbody>
    </table></div></div>
  </div>`;

  // رسم بياني نصي للمقارنة
  html += `<div class="card"><div class="ch"><h3>📊 مؤشرات المقارنة بين الحلقات</h3></div><div class="cb">`;

  // أشرطة الحضور
  html += `<div style="font-size:13px;font-weight:700;color:var(--gd);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e0e0e0">📅 نسبة الحضور</div>`;
  circleStats.forEach(cs => {
    html += `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="font-weight:600">${cs.circle.name}</span>
        <span style="color:${attColor(cs.attRate)};font-weight:700">${cs.attRate}%</span>
      </div>
      <div style="background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden">
        <div style="width:${cs.attRate}%;background:${attColor(cs.attRate)};height:100%;border-radius:6px"></div>
      </div>
    </div>`;
  });

  // أشرطة الحفظ
  const maxMemo = Math.max(1, ...circleStats.map(cs => parseFloat(cs.memoAvg)||0));
  html += `<div style="font-size:13px;font-weight:700;color:#14568f;margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid #e0e0e0">📖 متوسط الحفظ /5</div>`;
  circleStats.forEach(cs => {
    const pct = Math.round((parseFloat(cs.memoAvg)||0) / 5 * 100);
    const col = pct>=80?'#1d6b3a':pct>=60?'#14568f':'#a66a0c';
    html += `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="font-weight:600">${cs.circle.name}</span>
        <span style="color:${col};font-weight:700">${cs.memoAvg}/5</span>
      </div>
      <div style="background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden">
        <div style="width:${pct}%;background:${col};height:100%;border-radius:6px"></div>
      </div>
    </div>`;
  });

  // أشرطة السلوك
  html += `<div style="font-size:13px;font-weight:700;color:#6b3fa0;margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid #e0e0e0">🌟 متوسط السلوك /5</div>`;
  circleStats.forEach(cs => {
    const pct = Math.round((parseFloat(cs.behAvg)||0) / 5 * 100);
    const col = pct>=80?'#6b3fa0':pct>=60?'#a66a0c':'#a3262b';
    html += `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="font-weight:600">${cs.circle.name}</span>
        <span style="color:${col};font-weight:700">${cs.behAvg}/5</span>
      </div>
      <div style="background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden">
        <div style="width:${pct}%;background:${col};height:100%;border-radius:6px"></div>
      </div>
    </div>`;
  });

  html += '</div></div>';

  c.innerHTML = html;
}

// ===================== WEEKLY REPORT =====================
async function initWeeklyReport() {
  // ضبط التواريخ الافتراضية: آخر 7 أيام
  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(today.getDate() - 6);
  const fmt = d => d.toISOString().split('T')[0];
  const fromEl = document.getElementById('weekly-from');
  const toEl = document.getElementById('weekly-to');
  if (fromEl) fromEl.value = fmt(weekAgo);
  if (toEl) toEl.value = fmt(today);

  // ملء قائمة الحلقات
  const circleSel = document.getElementById('weekly-circle');
  if (circleSel) {
    const { data: circles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id).order('name');
    if (circles?.length) {
      circleSel.innerHTML = '<option value="">اختر الحلقة</option>' + circles.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      if (circles.length === 1) {
        circleSel.value = circles[0].id;
        document.getElementById('weekly-circle-wrap').style.display = 'none';
      }
    }
  }
  document.getElementById('weekly-preview').innerHTML = `<div class="empty"><div class="ei">📨</div><p>اختر الفترة الزمنية ثم اضغط "توليد التقرير الأسبوعي"</p></div>`;
}

async function generateWeeklyReport() {
  const startDate = document.getElementById('weekly-from').value;
  const endDate = document.getElementById('weekly-to').value;
  const selectedCircleId = document.getElementById('weekly-circle')?.value;
  const preview = document.getElementById('weekly-preview');

  if (!startDate || !endDate) { alert('اختر الفترة الزمنية أولاً'); return; }
  preview.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ جمع البيانات...</p></div>';

  // جلب الحلقات
  const { data: allCircles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id);
  if (!allCircles?.length) { preview.innerHTML = emptyDiv('🕌','لم يتم تعيينك في حلقة'); return; }

  let circles;
  if (allCircles.length > 1 && !selectedCircleId) {
    preview.innerHTML = emptyDiv('👆', 'اختر الحلقة أولاً');
    return;
  } else if (selectedCircleId) {
    circles = allCircles.filter(c => c.id === selectedCircleId);
  } else {
    circles = allCircles;
  }

  const circleIds = circles.map(c => c.id);
  const { data: students } = await sb.from('students').select('id,full_name,parent_phone,circle_id').in('circle_id', circleIds).order('full_name');
  if (!students?.length) { preview.innerHTML = emptyDiv('🎓','لا يوجد طلاب في حلقاتك'); return; }

  const studentIds = students.map(s => s.id);

  const [attRes, memoRes, behRes] = await Promise.all([
    sb.from('attendance').select('student_id,status').in('student_id', studentIds).in('circle_id', circleIds).gte('date', startDate).lte('date', endDate),
    sb.from('memorization_log').select('student_id,mastery,verses_count,surah_from,surah_to').in('student_id', studentIds).gte('date', startDate).lte('date', endDate),
    sb.from('behavior_log').select('student_id,score').in('student_id', studentIds).gte('date', startDate).lte('date', endDate)
  ]);

  const att = attRes.data || [];
  const memo = memoRes.data || [];
  const beh = behRes.data || [];

  const studentData = students.map(s => {
    const sAtt = att.filter(a => a.student_id === s.id);
    const sMemo = memo.filter(m => m.student_id === s.id);
    const sBeh = beh.filter(b => b.student_id === s.id);
    return {
      id: s.id, name: s.full_name, phone: s.parent_phone||'', circle_id: s.circle_id,
      present: sAtt.filter(a => a.status==='present').length,
      absent: sAtt.filter(a => a.status==='absent').length,
      excused: sAtt.filter(a => a.status==='excused').length,
      memoSessions: sMemo.length,
      memoVerses: sMemo.reduce((s,m) => s+(m.verses_count||0), 0),
      memoMastery: sMemo.length ? (sMemo.reduce((s,m) => s+(m.mastery==='excellent'?5:m.mastery==='good'?4:m.mastery==='needs_review'?2:1),0)/sMemo.length).toFixed(1) : '—',
      behAvg: sBeh.length ? (sBeh.reduce((s,b) => s+b.score, 0)/sBeh.length).toFixed(1) : '—'
    };
  });

  // تنسيق التاريخ بالعربي
  const fmtAr = d => new Date(d).toLocaleDateString('ar-KW', {day:'numeric',month:'long',year:'numeric'});

  const studentsHtml = studentData.map(s => `
    <div class="student-report-row">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px">
        <div style="font-weight:700">${s.name}</div>
        ${s.phone ? `<button onclick="sendWeeklyWA('${s.phone}','${s.name.replace(/'/g,"\\'")}',${s.present},${s.absent},${s.excused},${s.memoSessions},${s.memoVerses},'${s.memoMastery}','${s.behAvg}','${startDate}','${endDate}','${s.circle_id}')"
          style="padding:5px 12px;background:#25D366;color:white;border:none;border-radius:20px;cursor:pointer;font-size:11px;font-family:'Cairo',sans-serif;font-weight:700">
          📱 إرسال لولي الأمر
        </button>` : '<span style="font-size:11px;color:var(--mid)">لا يوجد هاتف</span>'}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="badge be">✓ ${s.present} حضور</span>
        <span class="badge ba">✗ ${s.absent} غياب</span>
        ${s.excused>0?`<span class="badge bex">~ ${s.excused} بعذر</span>`:''}
        <span class="badge bg">📖 ${s.memoSessions} جلسة (${s.memoVerses} آية)</span>
        <span class="badge bp">🌟 سلوك ${s.behAvg}/5</span>
      </div>
    </div>`).join('');

  preview.innerHTML = `
    <div class="report-card">
      <div class="report-card-head">
        <h3>📨 التقرير الأسبوعي</h3>
        <span style="font-size:12px;color:var(--mid)">${fmtAr(startDate)} — ${fmtAr(endDate)}</span>
      </div>
      <div class="report-section">
        <h4>📊 ملخص الأسبوع</h4>
        <div class="stat-row">
          <div class="stat-box"><div class="num">${studentData.length}</div><div class="lbl">الطلاب</div></div>
          <div class="stat-box"><div class="num">${att.filter(a=>a.status==='present').length}</div><div class="lbl">إجمالي الحضور</div></div>
          <div class="stat-box"><div class="num">${att.filter(a=>a.status==='absent').length}</div><div class="lbl">إجمالي الغياب</div></div>
          <div class="stat-box"><div class="num">${memo.length}</div><div class="lbl">جلسات الحفظ</div></div>
          <div class="stat-box"><div class="num">${memo.reduce((s,m)=>s+(m.verses_count||0),0)}</div><div class="lbl">آيات محفوظة</div></div>
        </div>
      </div>
      <div class="report-section">
        <h4>🎓 تفاصيل الطلاب — اضغط 📱 لإرسال تقرير ولي الأمر عبر واتساب</h4>
        ${studentsHtml}
      </div>
    </div>`;
}

function sendWeeklyWA(phone, name, present, absent, excused, memoSessions, memoVerses, memoMastery, behAvg, startDate, endDate, circleId) {
  const fmtAr = d => new Date(d).toLocaleDateString('ar-KW', {day:'numeric',month:'long'});
  const masteryText = {'5.0':'ممتاز','4.0':'جيد','3.0':'جيد','2.0':'يحتاج مراجعة','1.0':'ضعيف'}[memoMastery] || (parseFloat(memoMastery)>=4?'ممتاز':parseFloat(memoMastery)>=3?'جيد':'يحتاج متابعة');
  const attRate = present+absent>0 ? Math.round(present/(present+absent)*100) : 0;

  const msg = `السلام عليكم ورحمة الله 🌙\n\nولي أمر الطالب / ${name}\n\n📨 التقرير الأسبوعي\n(${fmtAr(startDate)} — ${fmtAr(endDate)})\n\n✅ الحضور: ${present} يوم\n❌ الغياب: ${absent} يوم${excused>0?'\n🟡 بعذر: '+excused+' يوم':''}\n📊 نسبة الحضور: ${attRate}%\n\n📖 الحفظ: ${memoSessions} جلسة (${memoVerses} آية)\n⭐ مستوى الإتقان: ${masteryText}\n🌟 السلوك: ${behAvg}/5\n\nبارك الله فيكم 🌿\nبرنامج سند`;

  const cleanPhone = phone.replace(/\D/g, '');
  const waPhone = cleanPhone.startsWith('0') ? '965' + cleanPhone.slice(1) : cleanPhone;
  window.open('https://wa.me/' + waPhone + '?text=' + encodeURIComponent(msg), '_blank');

  // نسجّل بصمت أن المحفظ أرسل تقرير هذا الطالب تحديدًا هذا الأسبوع، ليظهر تراكميًا عند المشرف
  // (هذه هي الشاشة الفعلية التي يستخدمها المحفظون للإرسال الفردي لكل طالب على حدة)
  if (circleId && circleId !== 'undefined') {
    const now = new Date();
    now.setDate(now.getDate() - now.getDay());
    const weekStartStr = now.toISOString().split('T')[0];
    sb.from('weekly_report_sends').insert({ teacher_id: CU.id, circle_id: circleId, week_start: weekStartStr, sent_count: 1 })
      .then(({error}) => {
        if (error) {
          console.error('تعذر تسجيل إرسال التقرير الأسبوعي:', error);
          showGlobalError('⚠️ تم فتح واتساب، لكن تعذّر تسجيل حالة الإرسال للمشرف: ' + error.message);
        }
      });
  }
}

// ===================== MONTHLY REPORT =====================
const MONTHS_AR = ['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

async function initMonthlyReport() {
  const now = new Date();
  const prevMonth = now.getMonth() === 0 ? 12 : now.getMonth();
  const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
  const mSel = document.getElementById('report-month');
  const ySel = document.getElementById('report-year');
  if (mSel) mSel.value = prevMonth;
  if (ySel) ySel.value = prevYear;

  // ملء قائمة الحلقات
  const circleSel = document.getElementById('report-circle');
  if (circleSel) {
    const { data: circles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id).order('name');
    if (circles?.length) {
      circleSel.innerHTML = '<option value="">اختر الحلقة</option>' + circles.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      // إذا كانت حلقة واحدة فقط اختارها تلقائياً
      if (circles.length === 1) circleSel.value = circles[0].id;
      // إخفاء القائمة إذا كان لديه حلقة واحدة فقط
      const wrap = document.getElementById('report-circle-wrap');
      if (wrap) wrap.style.display = circles.length === 1 ? 'none' : '';
    }
  }

  document.getElementById('report-preview').innerHTML = `
    <div class="empty"><div class="ei">📋</div><p>اختر الشهر والحلقة ثم اضغط "توليد التقرير"</p></div>`;
}

async function generateMonthlyReport() {
  const month = parseInt(document.getElementById('report-month').value);
  const year = parseInt(document.getElementById('report-year').value);
  const selectedCircleId = document.getElementById('report-circle')?.value;
  const preview = document.getElementById('report-preview');
  preview.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ جمع البيانات...</p></div>';

  // جلب حلقات المحفظ
  const { data: allCircles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id);
  if (!allCircles?.length) { preview.innerHTML = emptyDiv('🕌','لم يتم تعيينك في حلقة'); return; }

  // استخدام الحلقة المختارة فقط إذا كان هناك أكثر من حلقة
  let circles;
  if (allCircles.length > 1 && !selectedCircleId) {
    preview.innerHTML = emptyDiv('👆', 'اختر الحلقة أولاً ثم اضغط توليد التقرير');
    return;
  } else if (selectedCircleId) {
    circles = allCircles.filter(c => c.id === selectedCircleId);
  } else {
    circles = allCircles;
  }

  const circleIds = circles.map(c => c.id);
  // حساب آخر يوم في الشهر بشكل صحيح
  const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
  const lastDay = new Date(year, month, 0).getDate();
  const endDate = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;

  // جمع البيانات - أولاً الطلاب ثم باقي البيانات
  const { data: students } = await sb.from('students').select('id,full_name,parent_phone').in('circle_id', circleIds).order('full_name');
  const studentIds = students?.map(s=>s.id) || [];

  if (!students?.length) { preview.innerHTML = emptyDiv('🎓','لا يوجد طلاب في حلقاتك'); return; }

  const [attRes, memoRes, reviewRes, behRes] = await Promise.all([
    // نجلب الحضور بـ student_id لكن نضيف فلتر circle_id أيضاً لمنع تسرب بيانات حلقات أخرى
    studentIds.length ? sb.from('attendance').select('student_id,status').in('student_id', studentIds).in('circle_id', circleIds).gte('date', startDate).lte('date', endDate) : {data:[]},
    studentIds.length ? sb.from('memorization_log').select('student_id,date,mastery,verses_count,surah_from,ayah_from,surah_to,ayah_to').in('student_id', studentIds).gte('date', startDate).lte('date', endDate) : {data:[]},
    studentIds.length ? sb.from('review_log').select('student_id,mastery').in('student_id', studentIds).gte('date', startDate).lte('date', endDate) : {data:[]},
    studentIds.length ? sb.from('behavior_log').select('student_id,score').in('student_id', studentIds).gte('date', startDate).lte('date', endDate) : {data:[]}
  ]);

  const att = attRes.data || [];
  const memo = memoRes.data || [];
  const review = reviewRes.data || [];
  const beh = behRes.data || [];

  // بناء بيانات كل طالب
  const studentData = students.map(s => {
    const sAtt = att.filter(a => a.student_id === s.id);
    const sMemo = memo.filter(m => m.student_id === s.id);
    const sReview = review.filter(r => r.student_id === s.id);
    const sBeh = beh.filter(b => b.student_id === s.id);
    // ترتيب سجلات الحفظ زمنياً لحساب مدى الحفظ خلال الشهر (من أول نقطة إلى آخر نقطة)
    const sMemoSorted = [...sMemo].sort((a,b) => new Date(a.date) - new Date(b.date));
    const memoFrom = sMemoSorted.length ? `${sMemoSorted[0].surah_from||''} ${sMemoSorted[0].ayah_from?'آية '+sMemoSorted[0].ayah_from:''}`.trim() : '—';
    const memoTo = sMemoSorted.length ? `${sMemoSorted[sMemoSorted.length-1].surah_to||''} ${sMemoSorted[sMemoSorted.length-1].ayah_to?'آية '+sMemoSorted[sMemoSorted.length-1].ayah_to:''}`.trim() : '—';
    return {
      id: s.id, name: s.full_name,
      phone: s.parent_phone || '',
      present: sAtt.filter(a => a.status === 'present').length,
      absent: sAtt.filter(a => a.status === 'absent').length,
      excused: sAtt.filter(a => a.status === 'excused').length,
      totalAtt: sAtt.length,
      memoSessions: sMemo.length,
      memoVerses: sMemo.reduce((s,m) => s + (m.verses_count||0), 0),
      memoFrom, memoTo,
      memoMastery: sMemo.length ? sMemo.reduce((s,m) => s + (m.mastery==='excellent'?5:m.mastery==='good'?4:m.mastery==='needs_review'?2:1), 0)/sMemo.length : 0,
      reviewSessions: sReview.length,
      reviewVerses: sReview.reduce((s,r) => s + (r.verses_count||0), 0),
      behSessions: sBeh.length,
      behAvg: sBeh.length ? (sBeh.reduce((s,b) => s + b.score, 0) / sBeh.length).toFixed(1) : '—'
    };
  });

  // ملخص إجمالي
  const totalPresent = att.filter(a => a.status === 'present').length;
  const totalAbsent = att.filter(a => a.status === 'absent').length;
  const totalMemoSessions = memo.length;
  const totalMemoVerses = memo.reduce((s,m) => s + (m.verses_count||0), 0);
  const totalReviewSessions = review.length;

  const reportData = { students: studentData, totals: { totalPresent, totalAbsent, totalMemoSessions, totalMemoVerses, totalReviewSessions }, circles: circles.map(c=>c.name).join('، '), month, year };

  // حفظ أو تحديث في قاعدة البيانات
  // مهم: البحث يجب أن يشمل الحلقة (circle_id) وليس فقط المحفظ+الشهر+السنة،
  // وإلا فإن توليد تقرير لحلقة ثانية لنفس الشهر يستبدل بيانات حلقة أخرى بالخطأ
  // مع إبقاء اسم الحلقة القديم في العنوان (خطأ تم رصده فعليًا).
  const { data: existing } = await sb.from('monthly_reports')
    .select('id').eq('teacher_id', CU.id).eq('month', month).eq('year', year).eq('circle_id', circleIds[0]).maybeSingle();

  let reportId;
  if (existing) {
    await sb.from('monthly_reports').update({ report_data: reportData, status: 'draft', submitted_at: null, circle_id: circleIds[0] }).eq('id', existing.id);
    reportId = existing.id;
  } else {
    const { data: ins } = await sb.from('monthly_reports').insert({
      teacher_id: CU.id, month, year,
      circle_id: circleIds[0], report_data: reportData, status: 'draft'
    }).select().single();
    reportId = ins?.id;
  }

  renderReportPreview(reportData, month, year, reportId, 'draft');
}

function sendStudentWA(phone, name, present, absent, memoVerses, memoFrom, memoTo, reviewSessions, month, year) {
  const monthName = MONTHS_AR[parseInt(month)] || month;

  const rangeText = (memoFrom && memoFrom !== '—') ? `من ${memoFrom} إلى ${memoTo}` : 'لا يوجد تسجيل حفظ هذا الشهر';

  const cleanPhone = phone.replace(/\D/g, '');
  const waPhone = cleanPhone.startsWith('0') ? '965' + cleanPhone.slice(1) : cleanPhone;
  window.open('https://wa.me/' + waPhone + '?text=' + encodeURIComponent(msg), '_blank');
}

async function submitMonthlyReport(reportId, month, year) {
  const notes = document.getElementById('teacher-notes-input')?.value || '';

  // تحديث التقرير في DB
  const { data: report } = await sb.from('monthly_reports')
    .update({ teacher_notes: notes, status: 'submitted', submitted_at: new Date().toISOString() })
    .eq('id', reportId)
    .select('*').single();

  // إرسال إشعارات للمشرفين والمدير
  const { data: myCircles } = await sb.from('circles').select('id').eq('teacher_id', CU.id);
  const circleIds = myCircles?.map(c => c.id) || [];

  // المشرفون المرتبطون بهذه الحلقات
  if (circleIds.length) {
    const { data: supLinks } = await sb.from('supervisor_circles').select('supervisor_id').in('circle_id', circleIds);
    const supIds = [...new Set((supLinks||[]).map(l => l.supervisor_id))];
    for (const sid of supIds) {
      await sendNotification(sid,
        `📋 تقرير شهري جديد — ${MONTHS_AR[month]} ${year}`,
        `رفع ${CP.full_name} التقرير الشهري لشهر ${MONTHS_AR[month]} ${year}`,
        'monthly_report', reportId);
    }
  }

  // المدير
  const { data: admins } = await sb.from('profiles').select('id').eq('role','admin');
  for (const a of (admins||[])) {
    await sendNotification(a.id,
      `📋 تقرير شهري جديد — ${MONTHS_AR[month]} ${year}`,
      `رفع ${CP.full_name} التقرير الشهري لشهر ${MONTHS_AR[month]} ${year}`,
      'monthly_report', reportId);
  }

  alert(`✅ تم إرسال التقرير للمشرف والمدير`);
  if (report) renderReportPreview({ ...report.report_data, teacherNotes: notes }, month, year, reportId, 'submitted');
}

function initReportsView() {
  const now = new Date();
  const prevMonth = now.getMonth() === 0 ? 12 : now.getMonth();
  const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
  const mSel = document.getElementById('view-report-month');
  const ySel = document.getElementById('view-report-year');
  if (mSel) mSel.value = prevMonth;

  loadReportsView();
}

async function loadReportsView() {
  const month = parseInt(document.getElementById('view-report-month')?.value);
  const year = parseInt(document.getElementById('view-report-year')?.value);
  const list = document.getElementById('reports-list');
  list.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ التحميل...</p></div>';

  let q = sb.from('monthly_reports')
    .select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name)')
    .eq('month', month).eq('year', year)
    .order('submitted_at', {ascending: false, nullsFirst: false});

  // المشرف يرى فقط تقارير محفظي حلقاته
  if (CP.role === 'supervisor') {
    const { data: links } = await sb.from('supervisor_circles').select('circle_id').eq('supervisor_id', CU.id);
    const circleIds = links?.map(l => l.circle_id) || [];
    if (circleIds.length) {
      const { data: circles } = await sb.from('circles').select('teacher_id').in('id', circleIds);
      const teacherIds = [...new Set(circles?.map(c => c.teacher_id).filter(Boolean))];
      if (teacherIds.length) q = q.in('teacher_id', teacherIds);
    }
  }

  const { data: reports } = await q;

  if (!reports?.length) {
    list.innerHTML = emptyDiv('📋', `لا توجد تقارير مرفوعة لشهر ${MONTHS_AR[month]} ${year}`);
    return;
  }

  list.innerHTML = reports.map(r => {
    const d = r.report_data || {};
    // نستخدم اسم الحلقة المجمَّد وقت توليد التقرير (وليس اسمها الحالي)
    // لأن اسم الحلقة قد يتغيّر لاحقًا، فيسبب التباسًا بين تقارير أشهر مختلفة لنفس الحلقة
    const circleName = d.circles || '';
    const statusBadge = r.status === 'submitted'
      ? '<span class="report-status-submitted">✅ مُرسَل</span>'
      : '<span class="report-status-draft">📝 مسودة</span>';
    const submittedDate = r.submitted_at ? `<span style="font-size:12px;color:var(--mid)">أُرسل في: ${formatTime(r.submitted_at)}</span>` : '';
    return `
      <div class="report-card">
        <div class="report-card-head">
          <div>
            <h3>👨‍🏫 ${r.teacher?.full_name || '—'}${circleName ? ` <span style="font-weight:600;color:var(--gold);font-size:14px">— 🕌 ${circleName}</span>` : ''}</h3>
            ${submittedDate}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            ${statusBadge}
            <button class="btn btn-g btn-sm" onclick="showFullReport('${r.id}')">عرض التفاصيل</button>
            <button class="btn btn-o btn-sm" onclick="printMonthlyReport('${r.id}','${r.teacher?.full_name||''}',${r.month},${r.year})">🖨️ طباعة</button>
          </div>
        </div>
        <div class="report-section">
          <div class="stat-row">
            <div class="stat-box"><div class="num">${d.students?.length||0}</div><div class="lbl">الطلاب</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalPresent||0}</div><div class="lbl">حضور</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalAbsent||0}</div><div class="lbl">غياب</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalMemoVerses||0}</div><div class="lbl">آية محفوظة</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalReviewSessions||0}</div><div class="lbl">مراجعة</div></div>
          </div>
          ${r.teacher_notes ? `<div style="margin-top:12px;padding:12px;background:var(--gray);border-radius:10px;font-size:13px;border-right:3px solid var(--gold)"><strong>ملاحظات المحفظ:</strong><br>${r.teacher_notes}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function printMonthlyReport(reportId, teacherName, month, year) {
  const { data: r } = await sb.from('monthly_reports')
    .select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name),circle:circles(name)')
    .eq('id', reportId).single();
  if (!r) return;

  const d = r.report_data || {};
  const monthName = MONTHS_AR[month] || '';
  // نفضّل اسم الحلقة المخزَّن داخل بيانات التقرير نفسه وقت توليده (d.circles)
  // لأنه أوثق من العلاقة الحالية عبر circle_id، والتي قد تكون تغيّرت لاحقًا
  const circleName = d.circles || r.circle?.name || '';

  const studentsRows = (d.students||[]).map((s,i) => `
    <tr style="background:${i%2===0?'#f5f5f5':'white'}">
      <td style="padding:8px 10px;font-size:11px">${i+1}</td>
      <td style="padding:8px 10px;font-size:11px;font-weight:600">${s.name}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.present||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.absent||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.memoVerses||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:10px">${s.memoFrom||'—'}</td>
      <td style="padding:8px 10px;text-align:center;font-size:10px">${s.memoTo||'—'}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.reviewSessions||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.behAvg||'—'}</td>
    </tr>`).join('');

  document.getElementById('print-title').textContent = 
    `التقرير الشهري — ${circleName ? circleName + ' — ' : ''}${teacherName} — ${monthName} ${year} — سند`;
  document.getElementById('print-date').textContent = `تاريخ الطباعة: ${new Date().toLocaleDateString('ar-KW')}`;
  document.getElementById('print-table').innerHTML = `
    <!-- ملخص إجمالي -->
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:80px;background:#f0f7f0;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #1d6b3a">
        <div style="font-size:22px;font-weight:900;color:#1d6b3a">${d.students?.length||0}</div>
        <div style="font-size:10px;color:#555">الطلاب</div>
      </div>
      <div style="flex:1;min-width:80px;background:#f0f7f0;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #1d6b3a">
        <div style="font-size:22px;font-weight:900;color:#1d6b3a">${d.totals?.totalPresent||0}</div>
        <div style="font-size:10px;color:#555">إجمالي الحضور</div>
      </div>
      <div style="flex:1;min-width:80px;background:#fbe4e4;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #a3262b">
        <div style="font-size:22px;font-weight:900;color:#a3262b">${d.totals?.totalAbsent||0}</div>
        <div style="font-size:10px;color:#555">إجمالي الغياب</div>
      </div>
      <div style="flex:1;min-width:80px;background:#e0eefb;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #14568f">
        <div style="font-size:22px;font-weight:900;color:#14568f">${d.totals?.totalMemoVerses||0}</div>
        <div style="font-size:10px;color:#555">آية محفوظة</div>
      </div>
      <div style="flex:1;min-width:80px;background:#e0eefb;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #14568f">
        <div style="font-size:22px;font-weight:900;color:#14568f">${d.totals?.totalReviewSessions||0}</div>
        <div style="font-size:10px;color:#555">جلسات المراجعة</div>
      </div>
    </div>

    <!-- جدول الطلاب -->
    <table style="width:100%;border-collapse:collapse;margin-top:8px">
      <thead>
        <tr style="background:#0d1830;color:white">
          <th style="padding:8px 10px;text-align:right;font-size:11px">#</th>
          <th style="padding:8px 10px;text-align:right;font-size:11px">الطالب</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">حضور</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">غياب</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">آيات الحفظ</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">من</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">إلى</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">مراجعة</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">السلوك</th>
        </tr>
      </thead>
      <tbody>${studentsRows||'<tr><td colspan="8" style="text-align:center;padding:20px;color:#888">لا توجد بيانات</td></tr>'}</tbody>
    </table>

    ${r.teacher_notes ? `
    <div style="margin-top:14px;padding:12px;background:#f5f2ea;border-radius:8px;border-right:4px solid #0d1830">
      <strong style="font-size:12px">✍️ ملاحظات المحفظ:</strong>
      <p style="font-size:11px;margin-top:6px;line-height:1.7">${r.teacher_notes}</p>
    </div>` : ''}`;

  openPrintWindow();
}

async function showFullReport(reportId) {
  const { data: r } = await sb.from('monthly_reports')
    .select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name),circle:circles(name)')
    .eq('id', reportId).single();
  if (!r) return;
  showReportModal(r);
}

function showReportModal(r) {
  const d = r.report_data || {};
  const circleName = d.circles || r.circle?.name || '';
  document.getElementById('report-view-title').textContent = `تقرير ${circleName ? circleName + ' — ' : ''}${r.teacher?.full_name||'—'} — ${MONTHS_AR[r.month]} ${r.year}`;

  let studentsHtml = (d.students||[]).map(s => `
    <div class="student-report-row">
      <div style="font-weight:700;min-width:140px">${s.name}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="badge be">✓ ${s.present} حاضر</span>
        <span class="badge ba">✗ ${s.absent} غائب</span>
        <span class="badge bg">📖 مجموع الحفظ: ${s.memoVerses||0} آية${s.memoFrom && s.memoFrom!=='—' ? ` (من ${s.memoFrom} إلى ${s.memoTo})` : ''}</span>
        <span class="badge br">🔄 ${s.reviewSessions} مراجعة</span>
        <span class="badge bp">🌟 ${s.behAvg}/5 سلوك</span>
      </div>
    </div>`).join('');

  document.getElementById('report-view-body').innerHTML = `
    <div class="stat-row" style="margin-bottom:16px">
      <div class="stat-box"><div class="num">${d.students?.length||0}</div><div class="lbl">الطلاب</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalPresent||0}</div><div class="lbl">إجمالي الحضور</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalAbsent||0}</div><div class="lbl">إجمالي الغياب</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalMemoVerses||0}</div><div class="lbl">آيات محفوظة</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalReviewSessions||0}</div><div class="lbl">جلسات المراجعة</div></div>
    </div>
    <h4 style="margin-bottom:12px;font-size:14px;font-weight:700;color:var(--gd)">🎓 تفاصيل الطلاب</h4>
    ${studentsHtml}
    ${r.teacher_notes ? `<div style="margin-top:16px;padding:14px;background:var(--gray4);border-radius:12px;border-right:3px solid var(--gold)"><strong>✍️ ملاحظات المحفظ:</strong><br><p style="margin-top:6px;font-size:13px;line-height:1.7">${r.teacher_notes}</p></div>` : ''}`;

  openM('m-report-view');
}


</script>



<div id="print-area">
  <div class="print-header">
    <img src="sanad-logo.png" alt="شعار سند" style="width:90px;height:90px;object-fit:contain;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto">
  </div>
  <h2 id="print-title"></h2>
  <div class="print-date" id="print-date"></div>
  <div id="print-table"></div>
  <div class="print-footer">سند... حرفٌ يُحفظ، وجيلٌ يُبنى</div>
</div>

</body>
</html>
